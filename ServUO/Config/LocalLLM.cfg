# Local LLM Configuration (Ollama)
# Install: https://ollama.ai
# Download model: ollama pull phi3:mini
# Start server: ollama serve

Endpoint=http://localhost:11434
Model=phi3:mini

# Available models:
# phi3:mini (FASTEST, 8GB RAM, 1-2s responses) - RECOMMENDED for performance
# llama3.1:8b (good quality, 16GB RAM, 8-10s responses)
# llama3.1:70b (best quality, 48GB+ RAM, very slow)
# mistral:7b (fast, 16GB RAM)
# mistral-small (best instruction following, 14GB)
