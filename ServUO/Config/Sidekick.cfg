# AI Sidekicks Configuration File
# This file controls the behavior of the AI Sidekicks system

# ============================================
# System Settings
# ============================================

# Enable/disable the AI Sidekicks system
Sidekick.Enabled=true

# Maximum number of sidekicks per player
Sidekick.MaxPerPlayer=1

# ============================================
# Behavior Settings
# ============================================

# How often sidekicks make autonomous decisions (in seconds)
Sidekick.DecisionInterval=5

# Default follow distance in tiles (2-3 is recommended)
Sidekick.FollowDistance=3

# Distance threshold for teleporting to owner (tiles)
Sidekick.TeleportThreshold=12

# Enable autonomous behavior (goal system)
Sidekick.AutonomousBehavior=true

# ============================================
# Movement Settings
# ============================================

# Walk speed (0.2 is standard player walk speed)
Sidekick.WalkSpeed=0.2

# Run speed (0.4 is standard player run speed)
Sidekick.RunSpeed=0.4

# Passive speed (when not actively moving)
Sidekick.PassiveSpeed=0.2

# ============================================
# Combat Settings
# ============================================

# Enable player-like combat AI
Sidekick.PlayerLikeCombat=true

# Melee combat range (tiles)
Sidekick.CombatRange=1

# Archer combat range (tiles)
Sidekick.ArcherRange=8

# Mage combat range (tiles)
Sidekick.MageRange=10

# ============================================
# LLM Settings
# ============================================

# Enable combat commentary via LLM (may increase API costs)
Sidekick.CombatCommentary=true

# Minimum time between combat commentary (in seconds)
Sidekick.CombatCommentaryInterval=10

# Hearing range for LLM conversations (tiles)
Sidekick.HearingRange=10

# ============================================
# Equipment Settings
# ============================================

# Automatically equip starting gear based on archetype
Sidekick.AutoEquipStartingGear=true

# Allow owner to equip items on sidekick
Sidekick.AllowOwnerEquip=true

